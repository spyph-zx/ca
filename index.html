<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>For You 💗</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Nunito:wght@300;400;600&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="bgImage"></div>
  <div class="overlay-vignette"></div>
  <div class="overlay-grain"></div>

  <div id="petals-container" aria-hidden="true"></div>
  <div id="sparkles-container" aria-hidden="true"></div>

  <audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg" />
  </audio>

  <section id="screen-intro" class="screen active" role="button" tabindex="0" aria-label="Tap to open">
    <p class="eyebrow" data-anim="fadeUp" style="--delay:0.2s">a message, just for you</p>
    <div class="intro-orb" data-anim="scaleIn" style="--delay:0.5s">
      <div class="orb-ring orb-ring--outer"></div>
      <div class="orb-ring orb-ring--inner"></div>
      <span class="orb-heart" aria-hidden="true">💗</span>
    </div>
    <h1 class="intro-title" data-anim="fadeUp" style="--delay:0.8s">
      Something I've been<br /><em>longing</em> to tell you…
    </h1>
    <p class="tap-hint" data-anim="fadeUp" style="--delay:1.3s">
      <span class="tap-dot"></span> tap to reveal
    </p>
  </section>

  <section id="screen-pre-vids" class="screen">
    <div class="anim-wrapper" id="pre-vid-anim">
      <div class="video-frame">
        <span class="vf-corner vf-tl"></span>
        <span class="vf-corner vf-tr"></span>
        <span class="vf-corner vf-bl"></span>
        <span class="vf-corner vf-br"></span>
        <video id="vid-pre" playsinline></video>
      </div>
    </div>
  </section>

  <section id="screen-card" class="screen" aria-live="polite">
    <img id="gif" src="" alt="" />
    <h2 id="question" class="question-text"></h2>
    <div class="step-dots" id="stepDots" aria-hidden="true"></div>
    <div class="btn-row" id="btnRow">
      <button class="btn btn--yes" id="yes" aria-label="Yes">
        <span class="btn-icon" aria-hidden="true">💗</span>
        <span class="btn-label">Yes</span>
        <span class="btn-ripple" aria-hidden="true"></span>
      </button>
      <button class="btn btn--no" id="no" aria-label="No">
        <span class="btn-label">No…</span>
      </button>
    </div>
  </section>

  <section id="screen-video1" class="screen">
    <p class="video-caption" data-anim="fadeUp" style="--delay:0.2s">watch this… 🎬</p>
    <div class="video-frame">
      <span class="vf-corner vf-tl"></span>
      <span class="vf-corner vf-tr"></span>
      <span class="vf-corner vf-bl"></span>
      <span class="vf-corner vf-br"></span>
      <video id="vid1" playsinline muted preload="auto">
        <source src="video.mp4" type="video/mp4" />
      </video>
    </div>
    <button class="btn btn--next" id="skipVideo1" data-anim="fadeUp" style="--delay:0.5s">
      <span class="btn-label">Continue 💗</span>
    </button>
  </section>

  <section id="screen-success" class="screen" aria-live="assertive">
    <div class="success-burst" id="successBurst" aria-hidden="true"></div>
    <div class="success-content">
      <img id="successGif" src="" alt="" class="success-gif" />
      <p class="success-emoji" data-anim="popIn" style="--delay:0.1s">💗 🌹 💗</p>
      <div class="success-divider" data-anim="scaleX" style="--delay:0.5s"></div>
      <h1 class="success-title" data-anim="fadeUp" style="--delay:0.7s">
        I knew your heart<br /><em>would say yes…</em>
      </h1>
      <p class="success-sub" data-anim="fadeUp" style="--delay:1.0s">forever &amp; always 🌹</p>
      <button class="btn btn--next" id="nextAfterSuccess" data-anim="fadeUp" style="--delay:1.3s">
        <span class="btn-label">Next 💗</span>
      </button>
    </div>
  </section>

  <section id="screen-video2" class="screen">
    <p class="video-caption" data-anim="fadeUp" style="--delay:0.2s">this is for you 💗</p>
    <div class="video-frame">
      <span class="vf-corner vf-tl"></span>
      <span class="vf-corner vf-tr"></span>
      <span class="vf-corner vf-bl"></span>
      <span class="vf-corner vf-br"></span>
      <video id="vid2" playsinline loop>
        <source src="video2.mp4" type="video/mp4" />
      </video>
    </div>
    <a id="zeroxBtn" class="btn-zerox" href="#" data-anim="fadeUp" style="--delay:0.8s">
      <span class="zerox-glow-ring"></span>
      <span class="zerox-label">zerox</span>
    </a>
  </section>

  <section id="screen-post-vids" class="screen">
    <div class="anim-wrapper" id="post-vid-anim">
      <div class="video-frame">
        <span class="vf-corner vf-tl"></span>
        <span class="vf-corner vf-tr"></span>
        <span class="vf-corner vf-bl"></span>
        <span class="vf-corner vf-br"></span>
        <video id="vid-post" playsinline></video>
      </div>
    </div>
  </section>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
